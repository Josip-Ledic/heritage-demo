  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2a4a7f 100%);
      color: #faf9f6;
      min-height: 100vh;
      padding: 2rem;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 3rem;
      padding: 2rem;
      background: rgba(193, 154, 107, 0.1);
      border: 2px solid #c19a6b;
      border-radius: 12px;
    }
    
    h1 {
      font-size: 3rem;
      color: #c19a6b;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .subtitle {
      font-size: 1.2rem;
      color: #faf9f6;
      opacity: 0.9;
    }
    
    .intro {
      background: rgba(255,255,255,0.05);
      padding: 2rem;
      border-radius: 8px;
      margin-bottom: 3rem;
      line-height: 1.8;
    }
    
    .timeline {
      position: relative;
      padding-left: 2rem;
    }
    
    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, #c19a6b, rgba(193, 154, 107, 0.3));
    }
    
    .commit-card {
      background: rgba(255,255,255,0.05);
      border: 2px solid #c19a6b;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      margin-left: 2rem;
      position: relative;
      transition: all 0.3s ease;
    }
    
    .commit-card::before {
      content: '';
      position: absolute;
      left: -2.75rem;
      top: 1.5rem;
      width: 1rem;
      height: 1rem;
      background: #c19a6b;
      border-radius: 50%;
      border: 3px solid #1e3a5f;
    }
    
    .commit-card:hover {
      background: rgba(193, 154, 107, 0.1);
      transform: translateX(5px);
      box-shadow: 0 5px 20px rgba(193, 154, 107, 0.3);
    }
    
    .commit-number {
      display: inline-block;
      background: #c19a6b;
      color: #1e3a5f;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    
    .commit-hash {
      font-family: 'Courier New', monospace;
      color: #c19a6b;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    
    .commit-message {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      font-style: italic;
    }
    
    .commit-link {
      display: inline-block;
      background: #c19a6b;
      color: #1e3a5f;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    .commit-link:hover {
      background: #faf9f6;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(193, 154, 107, 0.4);
    }
    
    footer {
      text-align: center;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 2px solid rgba(193, 154, 107, 0.3);
      opacity: 0.7;
    }
    
    .github-link {
      color: #c19a6b;
      text-decoration: none;
      font-weight: bold;
    }
    
    .github-link:hover {
      color: #faf9f6;
    }
